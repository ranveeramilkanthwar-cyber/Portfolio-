<style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

    :root {
        --glass: rgba(255, 255, 255, 0.1);
        --border: rgba(255, 255, 255, 0.2);
        --bg: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        --text: #ffffff;
    }

    /* Supernova Theme (Bright) */
    .theme-bright {
        --bg: radial-gradient(circle at center, #ffffff 0%, #cbd5e1 100%);
        --text: #1e293b;
        --glass: rgba(0, 0, 0, 0.05);
        --border: rgba(0, 0, 0, 0.1);
    }

    /* Nebula Theme (Grey) */
    .theme-grey {
        --bg: radial-gradient(circle at center, #475569 0%, #1e293b 100%);
        --text: #f8fafc;
        --glass: rgba(255, 255, 255, 0.05);
    }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: 'Space Grotesk', sans-serif;
        overflow-x: hidden;
        transition: background 0.5s ease, color 0.5s ease;
    }

    /* --- Warp Speed Stars --- */
    #stars-container {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: -1;
        perspective: 800px;
    }

    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0;
        animation: warpSpeed var(--duration) linear infinite;
    }

    .theme-bright .star { background: #6366f1; }

    @keyframes warpSpeed {
        0% { transform: translateZ(-1000px); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateZ(800px); opacity: 0; }
    }

    /* --- Social Media Glass Dock --- */
    .social-dock {
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        padding: 1rem;
        z-index: 50;
    }

    .social-link {
        font-size: 1.5rem;
        color: var(--text);
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .social-link:hover {
        transform: scale(1.4) translateX(10px);
        color: #6366f1;
    }

    /* --- Theme Toggles --- */
    .theme-controls {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        z-index: 100;
    }

    .theme-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--glass);
        backdrop-filter: blur(5px);
    }

    /* --- Original Card & Button Styles --- */
    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 24px;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .elastic-btn {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        border-radius: 12px;
        font-weight: bold;
        color: white !important;
    }

    .elastic-btn:hover { transform: scale(1.1) translateY(-5px); }

    .profile-img {
        width: 250px;
        height: 350px;
        object-fit: cover;
        border-radius: 20px;
        border: 2px solid #6366f1;
    }
</style>

<div class="theme-controls">
    <div class="theme-btn" onclick="setTheme('dark')" title="Deep Space"><i class="fas fa-moon"></i></div>
    <div class="theme-btn" onclick="setTheme('grey')" title="Nebula"><i class="fas fa-circle-half-stroke"></i></div>
    <div class="theme-btn" onclick="setTheme('bright')" title="Supernova"><i class="fas fa-sun"></i></div>
</div>

<div class="social-dock glass-card">
    <a href="https://www.linkedin.com/in/ranveer-amilkanthwar-061a08265" target="_blank" class="social-link"><i class="fab fa-linkedin"></i></a>
    <a href="https://github.com/ranveeramilkanthwar-cyber" target="_blank" class="social-link"><i class="fab fa-github"></i></a>
    <a href="https://instagram.com/your_instagram" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
    <a href="mailto:ranveeramilkanthwar@gmail.com" class="social-link"><i class="fas fa-envelope"></i></a>
</div>

<script>
    // 1. Warp Speed Star Generation
    const container = document.getElementById('stars-container');
    const createStars = () => {
        container.innerHTML = '';
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const x = Math.random() * 200 - 100;
            const y = Math.random() * 200 - 100;
            star.style.left = `calc(50% + ${x}%)`;
            star.style.top = `calc(50% + ${y}%)`;
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(star);
        }
    }
    createStars();

    // 2. Theme Engine
    function setTheme(theme) {
        document.body.className = ''; // Reset
        if(theme !== 'dark') document.body.classList.add('theme-' + theme);
    }

    // 3. Parallax & Gyroscope
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 40;
        const y = (window.innerHeight / 2 - e.pageY) / 40;
        container.style.transform = `translateX(${x}px) translateY(${y}px)`;
        
        document.querySelectorAll('.planet').forEach(p => {
            p.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
        });
    });

    // 4. Chat Toggle (from original)
    function toggleChat() {
        const box = document.getElementById('chat-container');
        box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
    }
</script>
